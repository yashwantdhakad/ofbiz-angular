sonar.projectKey=ofbiz-angular
sonar.projectName=ofbiz-angular
sonar.sourceEncoding=UTF-8

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.spec.ts
sonar.exclusions=src/assets/**,src/environments/**,coverage/**,dist/**,node_modules/**
sonar.coverage.exclusions=src/**/*.module.ts,src/main.ts,src/test.ts,src/environments/**

sonar.typescript.tsconfigPaths=tsconfig.json
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.eslint.reportPaths=reports/eslint-report.json
