<mat-card class="mat-elevation-z10">
  <mat-card-header>
    <mat-card-title>
      <h3>{{ 'CATEGORY.CREATE_TITLE' | translate }}</h3>
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form
      (ngSubmit)="createCategory()"
      [formGroup]="categoryForm"
      class="create-form"
    >
      <mat-form-field appearance="outline">
        <mat-label>{{ 'CATEGORY.NAME' | translate }}</mat-label>
        <input
          matInput
          placeholder="{{ 'CATEGORY.NAME' | translate }}"
          formControlName="categoryName"
        />
        <mat-error *ngIf="categoryForm.get('categoryName')?.hasError('required')">
          {{ 'CATEGORY.NAME_REQUIRED' | translate }}
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>{{ 'CATEGORY.TYPE' | translate }}</mat-label>
        <mat-select formControlName="productCategoryTypeId" name="productCategoryTypeId">
          <mat-option
            *ngFor="let categoryType of categoryTypes(); trackBy: trackByCategoryType"
            [value]="categoryType.productCategoryTypeId"
          >{{ categoryType.description }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>{{ 'COMMON.DESCRIPTION' | translate }}</mat-label>
        <textarea
          matInput
          placeholder="{{ 'COMMON.DESCRIPTION' | translate }}"
          formControlName="description"
          name="description"
        ></textarea>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>{{ 'CATEGORY.PARENT' | translate }}</mat-label>
        <input
          matInput
          formControlName="primaryParentCategoryId"
          [placeholder]="'CATEGORY.PARENT_ID' | translate"
        />
      </mat-form-field>

      <div class="form-actions">
        <button
          mat-raised-button
          type="submit"
          color="primary"
          class="me-4"
          data-testid="category-create-save"
          [disabled]="isLoading()"
        >
          <span *ngIf="!isLoading()">{{ 'COMMON.SAVE' | translate }}</span>
          <mat-spinner *ngIf="isLoading()" diameter="20"></mat-spinner>
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
