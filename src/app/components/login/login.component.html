<main class="login-page">
  <section class="login-shell">
    <div class="login-brand" aria-hidden="true">
      <img class="brand-logo" src="assets/ofbiz-logo.png" alt="Apache OFBiz" />
      <p>{{ 'WELCOME' | translate }}</p>
    </div>

    <mat-card class="login-card mat-elevation-z10">
      <mat-card-header>
        <mat-card-title>{{ 'LOGIN_TITLE' | translate }}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>{{ 'USERNAME' | translate }}</mat-label>
            <input
              matInput
              autocomplete="username"
              [placeholder]="'USERNAME_PLACEHOLDER' | translate"
              formControlName="username"
            />
            <mat-error *ngIf="loginForm.get('username')?.invalid">{{ 'USERNAME_REQUIRED' | translate }}</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>{{ 'PASSWORD' | translate }}</mat-label>
            <input
              matInput
              [type]="showPassword ? 'text' : 'password'"
              autocomplete="current-password"
              [placeholder]="'PASSWORD_PLACEHOLDER' | translate"
              formControlName="password"
            />
            <button
              mat-icon-button
              matSuffix
              type="button"
              (click)="showPassword = !showPassword"
              [attr.aria-label]="(showPassword ? 'HIDE_PASSWORD' : 'SHOW_PASSWORD') | translate"
            >
              <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="loginForm.get('password')?.invalid">{{ 'PASSWORD_REQUIRED' | translate }}</mat-error>
          </mat-form-field>

          <button
            class="login-submit"
            mat-flat-button
            type="submit"
            color="primary"
            [disabled]="isLoading() || loginForm.invalid"
          >
            <ng-container *ngIf="!isLoading()">{{ 'SUBMIT_LOGIN' | translate }}</ng-container>
            <mat-spinner *ngIf="isLoading()" diameter="22"></mat-spinner>
          </button>
        </form>
      </mat-card-content>
    </mat-card>
  </section>
</main>
