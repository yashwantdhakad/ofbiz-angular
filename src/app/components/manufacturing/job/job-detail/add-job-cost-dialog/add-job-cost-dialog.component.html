<h2 mat-dialog-title>Add Job Cost</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="cost-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Cost Type</mat-label>
      <mat-select formControlName="costComponentTypeId">
        <mat-option *ngFor="let t of costTypes" [value]="t.id">{{ t.label }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description (optional)</mat-label>
      <input matInput formControlName="description" placeholder="e.g. Welding labor, Grinding" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Amount</mat-label>
      <input matInput type="number" formControlName="cost" min="0.01" step="0.01" />
      <mat-error *ngIf="form.get('cost')?.hasError('required')">Amount is required</mat-error>
      <mat-error *ngIf="form.get('cost')?.hasError('min')">Amount must be greater than 0</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Currency</mat-label>
      <input matInput formControlName="currencyUomId" />
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="dialogRef.close()">Cancel</button>
  <button mat-raised-button color="primary" (click)="submit()">Add Cost</button>
</mat-dialog-actions>
