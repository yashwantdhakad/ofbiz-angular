<div style="padding: 24px;">
  <div class="page-header">
    <h2 class="page-title">My Support Tickets</h2>
    <div style="display:flex; gap:12px;">
      <button mat-stroked-button routerLink="/support/admin" *ngIf="isAdmin">
        <mat-icon>admin_panel_settings</mat-icon> Admin Board
      </button>
      <button mat-raised-button color="primary" routerLink="/support/submit">
        <mat-icon>add</mat-icon> Submit New Request
      </button>
    </div>
  </div>

  <div *ngIf="loading" style="text-align:center; padding:40px;">
    <mat-progress-spinner mode="indeterminate" diameter="48"></mat-progress-spinner>
  </div>

  <ng-container *ngIf="!loading">
    <div class="table-container" *ngIf="dataSource.length > 0; else emptyState">
      <table mat-table [dataSource]="dataSource">

        <ng-container matColumnDef="custRequestId">
          <th mat-header-cell *matHeaderCellDef>Ticket ID</th>
          <td mat-cell *matCellDef="let row">
            <a [routerLink]="['/support/tickets', row.custRequestId]" style="color:#2563eb; text-decoration:none; font-weight:500;">
              {{ row.custRequestId }}
            </a>
          </td>
        </ng-container>

        <ng-container matColumnDef="custRequestName">
          <th mat-header-cell *matHeaderCellDef>Subject</th>
          <td mat-cell *matCellDef="let row">{{ row.custRequestName }}</td>
        </ng-container>

        <ng-container matColumnDef="custRequestTypeName">
          <th mat-header-cell *matHeaderCellDef>Type</th>
          <td mat-cell *matCellDef="let row">{{ row.custRequestTypeName || row.custRequestTypeId }}</td>
        </ng-container>

        <ng-container matColumnDef="priority">
          <th mat-header-cell *matHeaderCellDef>Priority</th>
          <td mat-cell *matCellDef="let row">
            <span class="priority-chip" [class]="getPriorityClass(row.priority)">{{ row.priority }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="statusId">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let row">
            <span class="status-chip" [class]="getStatusClass(row.statusId)">{{ row.statusId }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="createdDate">
          <th mat-header-cell *matHeaderCellDef>Submitted</th>
          <td mat-cell *matCellDef="let row">{{ row.createdDate | date: 'mediumDate' }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"
            [routerLink]="['/support/tickets', row.custRequestId]"></tr>
      </table>
      <mat-paginator
        [length]="totalElements"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [pageSizeOptions]="[10, 20, 50]"
        (page)="onPageChange($event)">
      </mat-paginator>
    </div>

    <ng-template #emptyState>
      <div class="empty-state">
        <mat-icon>support_agent</mat-icon>
        <p>No support tickets found.</p>
        <button mat-raised-button color="primary" routerLink="/support/submit">Submit your first request</button>
      </div>
    </ng-template>
  </ng-container>
</div>
