<mat-card class="mat-elevation-z10">
  <mat-card-header>
    <mat-card-title>
      <h1>Submit Support Request</h1>
    </mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="ticketForm" (ngSubmit)="onSubmit()" class="submit-form">
      <div class="form-grid">

        <!-- Subject — full width -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Subject</mat-label>
          <input matInput formControlName="subject" placeholder="Summarise the issue or request" />
          <mat-error *ngIf="ticketForm.get('subject')?.hasError('required')">Subject is required.</mat-error>
          <mat-error *ngIf="ticketForm.get('subject')?.hasError('maxlength')">
            Subject cannot exceed 255 characters.
          </mat-error>
        </mat-form-field>

        <!-- Request Type -->
        <mat-form-field appearance="outline">
          <mat-label>Request Type</mat-label>
          <mat-select formControlName="custRequestTypeId">
            <mat-option *ngFor="let type of ticketTypes" [value]="type.value">
              {{ type.label }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <!-- Priority -->
        <mat-form-field appearance="outline">
          <mat-label>Priority</mat-label>
          <mat-select formControlName="priority">
            <mat-option *ngFor="let p of priorities" [value]="p.value">
              {{ p.label }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <!-- Description — full width -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Detailed Description</mat-label>
          <textarea
            matInput
            formControlName="description"
            rows="6"
            placeholder="Please provide steps to reproduce, or details of the feedback..."
          ></textarea>
          <mat-error *ngIf="ticketForm.get('description')?.hasError('required')">
            Description is required.
          </mat-error>
        </mat-form-field>

      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button mat-raised-button color="primary" type="submit"
                [disabled]="ticketForm.invalid || submitting">
          <mat-spinner *ngIf="submitting" diameter="18" style="display:inline-block; margin-right:6px;"></mat-spinner>
          <span *ngIf="!submitting">Submit Request</span>
          <span *ngIf="submitting">Submitting…</span>
        </button>
        <button mat-stroked-button type="button" routerLink="/support/tickets" [disabled]="submitting">
          Cancel
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
